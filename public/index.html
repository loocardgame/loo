<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Loo Card Game</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/brand/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/brand/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">

  <meta name="theme-color" content="#050706">
  <meta name="application-name" content="Loo Card Game">
  <meta name="apple-mobile-web-app-title" content="Loo Card Game">

  <style>
    :root {
      --bg: #050706;
      --panel: #101812;
      --panel2: #16251b;
      --gold: #d8b76c;
      --text: #f6f1e7;
      --muted: #aeb8ad;
      --danger: #e95f5f;
      --ok: #7ee787;
      --border: rgba(216, 183, 108, 0.24);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(216, 183, 108, 0.12), transparent 35%),
        linear-gradient(135deg, #030403, var(--bg));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .hidden {
      display: none !important;
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: min(420px, 100%);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 26px;
    }

    .logo-img {
      width: 190px;
      max-width: 76%;
      margin: 0 auto 12px;
      display: block;
    }

    .logo-fallback {
      display: none;
      color: var(--gold);
      font-weight: 900;
      font-size: 42px;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: #070c09;
      color: var(--text);
      border-radius: 12px;
      padding: 13px;
      outline: none;
      font-size: 15px;
    }

    input:focus,
    select:focus {
      border-color: var(--gold);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 15px;
      background: var(--gold);
      color: #171207;
      cursor: pointer;
      font-weight: 800;
      font-size: 14px;
    }

    button.secondary {
      background: #243d2f;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    button.full {
      width: 100%;
      margin-top: 16px;
    }

    .app-shell {
      min-height: 100vh;
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .brand img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .userbar {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      padding: 22px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .grid-admin {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 16px 42px rgba(0,0,0,0.2);
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 19px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .status {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 13px;
      max-height: 220px;
      overflow: auto;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 760px;
    }

    th,
    td {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: left;
      padding: 10px;
      vertical-align: middle;
    }

    th {
      color: var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--gold);
      background: rgba(216, 183, 108, 0.10);
      font-size: 12px;
      font-weight: 800;
    }

    .pill.ok {
      color: var(--ok);
      border-color: rgba(126, 231, 135, 0.35);
      background: rgba(126, 231, 135, 0.08);
    }

    .pill.blocked {
      color: var(--danger);
      border-color: rgba(233, 95, 95, 0.35);
      background: rgba(233, 95, 95, 0.08);
    }

    .hall-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .table-card {
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .table-card h3 {
      color: var(--gold);
      margin: 0 0 8px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    @media (max-width: 960px) {
      .grid-admin {
        grid-template-columns: 1fr;
      }

      .hall-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        gap: 12px;
        flex-direction: column;
        align-items: flex-start;
      }

      .userbar {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (max-width: 520px) {
      .content {
        padding: 14px;
      }

      .login-card {
        padding: 22px;
        border-radius: 22px;
      }

      .logo-img {
        width: 150px;
      }

      button {
        width: 100%;
      }

      .quick-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- LOGIN -->
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="logo-wrap">
        <img
          class="logo-img"
          src="/logo.png"
          alt="Loo Card Game"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';"
        />
        <div id="logoFallback" class="logo-fallback">LOO</div>
        <div class="subtitle">Card Game</div>
      </div>

      <label>Usuário</label>
      <input id="loginField" autocomplete="username" placeholder="Digite seu usuário" />

      <label>Senha</label>
      <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Digite sua senha" />

      <button class="full" onclick="loginUser()">OK</button>

      <div id="loginMessage" class="status" style="margin-top:16px;">Aguardando login.</div>
    </div>
  </section>

  <!-- APP -->
  <section id="appPage" class="app-shell hidden">
    <div class="topbar">
      <div class="brand">
        <img src="/logo.png" alt="LOO" onerror="this.style.display='none';" />
        <span>LOO CARD GAME</span>
      </div>

      <div class="userbar">
        <span id="loggedUserLabel">Usuário</span>
        <button class="secondary" onclick="logout()">Sair</button>
      </div>
    </div>

    <main class="content">
      <!-- ADMIN -->
      <section id="adminPage" class="hidden">
        <div class="grid-admin">
          <aside>
            <div class="card">
              <h2>Criar usuário</h2>

              <label>Nick</label>
              <input id="newUsername" placeholder="ex: joao" />

              <label>Senha</label>
              <input id="newPassword" type="password" placeholder="mínimo 6 caracteres" />

              <button class="full" onclick="createUser()">Cadastrar usuário</button>
            </div>

            <div class="card">
              <h2>Adicionar / Retirar fichas</h2>

              <label>Usuário</label>
              <select id="chipsUserSelect"></select>

              <div class="quick-grid">
                <button onclick="adjustChips('ADD', 20)">+20</button>
                <button onclick="adjustChips('ADD', 50)">+50</button>
                <button onclick="adjustChips('ADD', 100)">+100</button>
              </div>

              <div class="quick-grid">
                <button class="danger" onclick="adjustChips('REMOVE', 20)">-20</button>
                <button class="danger" onclick="adjustChips('REMOVE', 50)">-50</button>
                <button class="danger" onclick="adjustChips('REMOVE', 100)">-100</button>
              </div>

              <label>Valor manual</label>
              <input id="customChipsAmount" type="number" min="1" placeholder="ex: 75" />

              <div class="row" style="margin-top:12px;">
                <button onclick="adjustCustomChips('ADD')">Adicionar</button>
                <button class="danger" onclick="adjustCustomChips('REMOVE')">Retirar / Sangria</button>
              </div>
            </div>

            <div class="card">
              <h2>Status</h2>
              <div id="adminStatus" class="status">Pronto.</div>
            </div>
          </aside>

          <section>
            <div class="card">
              <div class="row" style="justify-content:space-between;">
                <h2>Usuários cadastrados</h2>
                <button class="secondary" onclick="loadAdminUsers()">Atualizar</button>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Nick</th>
                      <th>Perfil</th>
                      <th>Fichas</th>
                      <th>Bloqueio</th>
                      <th>Mesas bloqueadas</th>
                      <th>Ação</th>
                    </tr>
                  </thead>
                  <tbody id="adminUsersTable"></tbody>
                </table>
              </div>
            </div>
          </section>
        </div>
      </section>

      <!-- HALL -->
      <section id="hallPage" class="hidden">
        <div class="card">
          <h2>Hall de mesas</h2>
          <div id="hallSummary" class="status">Carregando...</div>
        </div>

        <div class="card">
          <div class="row" style="justify-content:space-between;">
            <h2>Mesas disponíveis</h2>
            <button class="secondary" onclick="loadHall()">Atualizar</button>
          </div>

          <div id="hallTables" class="hall-grid"></div>
        </div>
      </section>
    </main>
  </section>

  <script>
    const API = window.location.origin;

    let token = localStorage.getItem("loo_token") || "";
    let currentUser = JSON.parse(localStorage.getItem("loo_user") || "null");
    let adminUsers = [];

    function qs(id) {
      return document.getElementById(id);
    }

    function setText(id, text) {
      qs(id).textContent = text;
    }

    function isAdmin(user) {
      return user && ["SYSTEM_ADMIN", "TABLE_ADMIN"].includes(user.role);
    }

    async function api(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (token) {
        headers.Authorization = "Bearer " + token;
      }

      const res = await fetch(API + path, {
        ...options,
        headers
      });

      const data = await res.json();

      if (!res.ok || data.ok === false) {
        throw new Error(data.message || data.error || "Erro na requisição.");
      }

      return data;
    }

    function showLogin() {
      qs("loginPage").classList.remove("hidden");
      qs("appPage").classList.add("hidden");
      qs("adminPage").classList.add("hidden");
      qs("hallPage").classList.add("hidden");
    }

    function showApp() {
      qs("loginPage").classList.add("hidden");
      qs("appPage").classList.remove("hidden");

      qs("loggedUserLabel").textContent =
        `${currentUser.avatarEmoji || "🃏"} ${currentUser.displayName} — ${currentUser.role}`;

      if (isAdmin(currentUser)) {
        qs("adminPage").classList.remove("hidden");
        qs("hallPage").classList.add("hidden");
        loadAdminUsers();
      } else {
        qs("adminPage").classList.add("hidden");
        qs("hallPage").classList.remove("hidden");
        loadHall();
      }
    }

    async function loginUser() {
      try {
        const data = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            login: qs("loginField").value,
            password: qs("loginPassword").value
          })
        });

        token = data.token;
        currentUser = data.user;

        localStorage.setItem("loo_token", token);
        localStorage.setItem("loo_user", JSON.stringify(currentUser));

        showApp();
      } catch (error) {
        setText("loginMessage", "Erro: " + error.message);
      }
    }

    function logout() {
      token = "";
      currentUser = null;

      localStorage.removeItem("loo_token");
      localStorage.removeItem("loo_user");

      showLogin();
    }

    async function loadMeOnStart() {
      if (!token) {
        showLogin();
        return;
      }

      try {
        const data = await api("/api/me");
        currentUser = data.user;
        localStorage.setItem("loo_user", JSON.stringify(currentUser));
        showApp();
      } catch (error) {
        logout();
      }
    }

    async function loadAdminUsers() {
      try {
        const data = await api("/api/admin/users");
        adminUsers = data.users;

        qs("chipsUserSelect").innerHTML = adminUsers
          .map(u => `<option value="${u.id}">${u.username} — ${Number(u.global_balance).toFixed(2)} fichas</option>`)
          .join("");

        qs("adminUsersTable").innerHTML = adminUsers.map(u => `
          <tr>
            <td>
              <strong>${u.username}</strong>
              <div class="small">${u.display_name}</div>
            </td>
            <td><span class="pill">${u.role}</span></td>
            <td>${Number(u.global_balance).toFixed(2)}</td>
            <td>
              ${u.is_banned
                ? `<span class="pill blocked">Bloqueado</span>`
                : `<span class="pill ok">Liberado</span>`
              }
            </td>
            <td>${u.blocked_tables_count}</td>
            <td>
              ${u.is_banned
                ? `<button class="secondary" onclick="toggleBan('${u.id}', false)">Desbloquear</button>`
                : `<button class="danger" onclick="toggleBan('${u.id}', true)">Bloquear</button>`
              }
            </td>
          </tr>
        `).join("");

        setText("adminStatus", `Usuários carregados: ${data.total}`);
      } catch (error) {
        setText("adminStatus", "Erro ao carregar usuários: " + error.message);
      }
    }

    async function createUser() {
      try {
        const username = qs("newUsername").value;
        const password = qs("newPassword").value;

        const data = await api("/api/admin/users", {
          method: "POST",
          body: JSON.stringify({
            username,
            password
          })
        });

        setText("adminStatus", "Usuário criado: " + data.user.username);

        qs("newUsername").value = "";
        qs("newPassword").value = "";

        await loadAdminUsers();
      } catch (error) {
        setText("adminStatus", "Erro ao criar usuário: " + error.message);
      }
    }

    async function toggleBan(userId, blocked) {
      try {
        await api(`/api/admin/users/${userId}/toggle-ban`, {
          method: "POST",
          body: JSON.stringify({ blocked })
        });

        await loadAdminUsers();
      } catch (error) {
        setText("adminStatus", "Erro ao alterar bloqueio: " + error.message);
      }
    }

    async function adjustChips(mode, amount) {
      try {
        const userId = qs("chipsUserSelect").value;

        await api("/api/admin/chips/adjust-global", {
          method: "POST",
          body: JSON.stringify({
            userId,
            amount,
            mode
          })
        });

        const txt = mode === "ADD"
          ? `Adicionadas ${amount} fichas.`
          : `Retiradas ${amount} fichas.`;

        setText("adminStatus", txt);
        await loadAdminUsers();
      } catch (error) {
        setText("adminStatus", "Erro ao ajustar fichas: " + error.message);
      }
    }

    async function adjustCustomChips(mode) {
      const amount = Number(qs("customChipsAmount").value || 0);

      if (!amount || amount <= 0) {
        setText("adminStatus", "Digite um valor válido.");
        return;
      }

      await adjustChips(mode, amount);
      qs("customChipsAmount").value = "";
    }

    async function loadHall() {
      try {
        const data = await api("/api/hall");

        qs("hallSummary").textContent =
          `Jogador: ${data.user.display_name}\nFichas globais: ${Number(data.user.global_balance).toFixed(2)}\nPerfil: ${currentUser.role}`;

        if (!data.tables.length) {
          qs("hallTables").innerHTML = `<div class="small">Nenhuma mesa disponível no momento.</div>`;
          return;
        }

        qs("hallTables").innerHTML = data.tables.map(t => `
          <div class="table-card">
            <h3>${t.name}</h3>
            <div class="small">Dono: ${t.owner_name}</div>
            <div class="small">Status: ${t.status}</div>
            <div class="small">Jogadores: ${t.members_count}/${t.max_players}</div>
            <div class="small">Convite: ${t.invite_code}</div>
            <button style="margin-top:12px;" onclick="joinTable('${t.id}')">Entrar na mesa</button>
          </div>
        `).join("");
      } catch (error) {
        qs("hallSummary").textContent = "Erro ao carregar hall: " + error.message;
      }
    }

    async function joinTable(tableId) {
      try {
        const data = await api(`/api/tables/${tableId}/join`, {
          method: "POST",
          body: JSON.stringify({})
        });

        alert(data.message);
        await loadHall();
      } catch (error) {
        alert("Erro: " + error.message);
      }
    }

    loadMeOnStart();
  </script>
</body>
</html>
